<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoldVision — Legal</title>
  <style>
    :root {
      --gold: #F5C842;
      --gold2: #FFE57A;
      --bg: #0A0A0C;
      --surface: #141416;
      --border: #2A2A2E;
      --text: #F0F0F0;
      --text2: #9A9A9E;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .logo {
      font-size: 52px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }
    .tagline {
      color: var(--text2);
      font-size: 14px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 640px;
      width: 100%;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 32px;
      flex: 1;
      min-width: 240px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover {
      border-color: var(--gold);
      transform: translateY(-2px);
    }
    .card-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.5;
    }
    footer {
      margin-top: 56px;
      font-size: 12px;
      color: var(--text2);
      text-align: center;
    }
    footer a { color: var(--gold); text-decoration: none; }
  </style>
</head>
<body>
  <div class="logo">GoldVision</div>
  <div class="tagline">AI-Powered Gold Intelligence</div>

  <div class="cards">
    <a class="card" href="privacy.html">
      <div class="card-icon">🔒</div>
      <div class="card-title">Privacy Policy</div>
      <div class="card-desc">How we handle your data — spoiler: we don't collect any.</div>
    </a>
    <a class="card" href="terms.html">
      <div class="card-icon">📄</div>
      <div class="card-title">Terms of Service</div>
      <div class="card-desc">Subscription terms, risk disclaimers, and your legal rights.</div>
    </a>
  </div>

  <footer>
    © 2026 GoldVision · All rights reserved ·
    <a href="mailto:axesalon@hotmail.ca">Contact Support</a>
  </footer>
</body>
</html>
